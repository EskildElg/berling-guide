<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Berlin · Guide</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#0d0d0d;--surf:#141414;--surf2:#1c1c1c;--b:#2a2a2a;--t:#F7F4EF;--m:#777;--a:#1E3EFF;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:system-ui,sans-serif;}
body{display:flex;flex-direction:column;}
#hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--b);background:var(--bg);z-index:1000;}
.logo{font-family:monospace;font-size:12px;font-weight:700;letter-spacing:.08em;color:#1E3EFF;}
.logo span{color:var(--m);}
.hbtns{display:flex;gap:8px;}
.hbtn{font-family:monospace;font-size:10px;background:var(--surf2);border:1px solid var(--b);color:var(--t);padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.hbtn.ok{border-color:#1E3EFF;color:#1E3EFF;}
#fbar{flex-shrink:0;display:flex;gap:6px;padding:7px 12px;overflow-x:auto;border-bottom:1px solid var(--b);background:var(--bg);z-index:1000;scrollbar-width:none;}
#fbar::-webkit-scrollbar{display:none;}
.fb{flex-shrink:0;white-space:nowrap;font-family:monospace;font-size:9px;background:var(--surf);border:1px solid var(--b);color:var(--m);padding:4px 9px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.fb .dot{width:6px;height:6px;border-radius:50%;}
.fb.on{color:var(--F7F4EF);border-color:#1E3EFF;background:var(--surf2);}
#main{flex:1;display:flex;overflow:hidden;min-height:0;}
#map{flex:1;}
.leaflet-container{background:#0d1117 !important;}
.leaflet-control-zoom a{background:var(--surf2)!important;color:var(--t)!important;border-color:var(--b)!important;}
.leaflet-control-attribution{background:rgba(14,14,14,.8)!important;color:var(--m)!important;font-size:8px;}
.leaflet-control-attribution a{color:var(--m)!important;}
.leaflet-popup-content-wrapper{background:var(--surf);border:1px solid var(--b);border-top:3px solid #1E3EFF;border-radius:0;box-shadow:0 8px 32px rgba(0,0,0,.8);padding:0;}
.leaflet-popup-content{margin:0;width:250px!important;color:var(--t);}
.leaflet-popup-tip{background:var(--surf);}
.leaflet-popup-close-button{color:var(--m)!important;font-size:18px!important;padding:6px 10px!important;top:4px!important;right:4px!important;}
.pi{border-bottom:1px solid var(--b);}
.pop-inner{padding:13px 14px 12px;}
.pop-cat{font-family:monospace;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.pop-name{font-size:14px;font-weight:600;color:var(--t);margin-bottom:3px;}
.pop-addr{font-size:10px;color:var(--m);margin-bottom:5px;}
.pop-meta{font-family:monospace;font-size:9px;color:#1E3EFF;margin-bottom:6px;}
.pop-note{font-size:10px;color:#bbb;font-style:italic;line-height:1.45;margin-bottom:9px;}
.pop-links{display:flex;gap:7px;flex-wrap:wrap;}
.pop-links a{font-family:monospace;font-size:8px;color:#1E3EFF;text-decoration:none;border:1px solid rgba(30,62,255,.3);padding:3px 7px;}
.mk{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.mk-b{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid rgba(255,255,255,.15);box-shadow:0 2px 8px rgba(0,0,0,.7);}
.mk.sel .mk-b{box-shadow:0 0 0 3px #c8ff00,0 2px 10px rgba(0,0,0,.8);}
.mk-tip{width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;margin-top:-1px;}
#sb{width:290px;flex-shrink:0;background:var(--surf);border-left:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.sbh{flex-shrink:0;padding:11px 13px 9px;border-bottom:1px solid var(--b);}
.sbh h2{font-family:monospace;font-size:9px;font-weight:400;color:var(--m);text-transform:uppercase;letter-spacing:.12em;}
.sbn{font-family:monospace;font-size:20px;font-weight:700;margin-top:1px;}
.sbl{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--b) transparent;}
.pi{display:flex;gap:8px;padding:10px 13px;border-bottom:1px solid var(--b);cursor:pointer;}
.pi:hover{background:var(--surf2);}
.pi.sel{background:rgba(30,62,255,.06);border-left:2px solid #1E3EFF;padding-left:11px;}
.pi-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:34px;}
.pi-body{flex:1;min-width:0;}
.pi-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-cat{font-family:monospace;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-top:2px;}
.pi-addr{font-size:10px;color:var(--m);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-note{font-size:10px;color:#aaa;font-style:italic;margin-top:3px;line-height:1.4;}
.pi-links{display:flex;gap:7px;margin-top:5px;flex-wrap:wrap;}
.pi-links a{font-family:monospace;font-size:8px;color:#1E3EFF;text-decoration:none;border:1px solid rgba(30,62,255,.3);padding:2px 7px;}
.pi-dist{font-family:monospace;font-size:10px;color:#1E3EFF;flex-shrink:0;margin-top:1px;}
.pi-dist.big{font-size:11px;font-weight:700;}
@media(max-width:660px){#sb{display:none;width:100%;border-left:none;border-top:1px solid var(--b);}#sb.open{display:flex;position:fixed;bottom:0;left:0;right:0;height:54vh;z-index:2000;}#tog{display:flex!important;}}
#tog{display:none;position:fixed;bottom:16px;right:12px;z-index:2001;background:#1E3EFF;color:#F7F4EF;border:none;font-family:monospace;font-size:10px;font-weight:700;padding:10px 15px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.5);}
</style>
</head>

var map,lMarkers={},lRoutes={},uMarker;
var active={},selId=null,uLat=null,uLng=null,sbOpen=false,nearbyMode=false;

function h2r(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
window.addEventListener('load',function(){
  map=L.map('map',{center:[52.505,13.405],zoom:13});
  // OpenFreeMap Positron — free, no key, shows buildings in gray, streets in warm tones
  L.tileLayer('https://tiles.openfreemap.org/styles/positron/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://openfreemap.org">OpenFreeMap</a> © <a href="https://openstreetmap.org/copyright">OSM</a>',
    maxZoom:20
  }).addTo(map);
  map.on('click',function(){if(selId!==null)deselect();});
  buildFilters();refresh();buildList();
});
function mkIcon(cat,isSel){
  var c=CATS[cat];
  // Full solid color, white border for contrast against any map background
  var ring=isSel?'box-shadow:0 0 0 3px #1E3EFF,0 0 0 5px #F7F4EF,0 2px 12px rgba(0,0,0,.5);':'box-shadow:0 0 0 2px rgba(255,255,255,0.9),0 2px 8px rgba(0,0,0,.4);';
  var textColor=(cat==='club')?'#F7F4EF':'#0d0d0d';
  var html='<div class="mk'+(isSel?' sel':'')+'"><div class="mk-b" style="background:'+c.color+';border:none;'+ring+'"><span style="font-size:14px;line-height:1;filter:none">'+c.emoji+'</span></div><div class="mk-tip" style="border-top:5px solid '+c.color+'"></div></div>';
  return L.divIcon({className:'',html:html,iconSize:[30,37],iconAnchor:[15,37],popupAnchor:[0,-40]});
}
function refresh(){
  Object.values(lMarkers).forEach(function(m){map.removeLayer(m);});
  Object.values(lRoutes).forEach(function(r){map.removeLayer(r.line);map.removeLayer(r.glow);});
  lMarkers={};lRoutes={};
  if(active['rute']){
    ROUTES.forEach(function(r){
      var isSel=selId===r.startId;
      var glow=L.polyline(r.path,{color:'#1E3EFF',weight:isSel?18:10,opacity:isSel?0.2:0.08,lineCap:'round'}).addTo(map);
      var line=L.polyline(r.path,{color:'#1E3EFF',weight:isSel?4:2.5,opacity:isSel?1:0.75,dashArray:isSel?null:'10 6',lineCap:'round'}).addTo(map);
      (function(sid){line.on('click',function(e){L.DomEvent.stopPropagation(e);select(sid);});glow.on('click',function(e){L.DomEvent.stopPropagation(e);select(sid);});})(r.startId);
      lRoutes[r.id]={line:line,glow:glow};
    });
  }
  P.forEach(function(p){
    if(!active[p.cat])return;
    var isSel=selId===p.id;
    var m=L.marker([p.lat,p.lng],{icon:mkIcon(p.cat,isSel),zIndexOffset:isSel?1000:0}).addTo(map);
    (function(pl){m.on('click',function(e){L.DomEvent.stopPropagation(e);select(pl.id);});})(p);
    lMarkers[p.id]=m;
  });
}
function popHtml(p){
  var c=CATS[p.cat],r=ROUTES.find(function(x){return x.startId===p.id;});
  var links='';
  if(p.url&&p.url!==p.ig)links+='<a href="'+p.url+'" target="_blank" rel="noopener">'+(r?'Komoot ↗':'Nettside ↗')+'</a>';
  if(p.ig)links+='<a href="'+p.ig+'" target="_blank" rel="noopener">Instagram ↗</a>';
  links+='<a href="https://maps.google.com/?q='+encodeURIComponent(p.name+' Berlin')+'" target="_blank" rel="noopener">Maps ↗</a>';
  return '<div class="pop-inner"><div class="pop-cat"><span style="color:'+c.color+'">'+c.emoji+' '+c.label+'</span></div><div class="pop-name">'+p.name+'</div><div class="pop-addr">'+p.addr+'</div>'+(r?'<div class="pop-meta">'+r.dist+' · '+r.terrain+'</div>':'')+'<div class="pop-note">'+p.note+'</div><div class="pop-links">'+links+'</div></div>';
}
function select(id){
  if(selId===id){deselect();return;}
  if(selId!==null&&lMarkers[selId])lMarkers[selId].closePopup();
  selId=id;refresh();
  var p=P.find(function(x){return x.id===id;});
  if(p){map.flyTo([p.lat,p.lng],Math.max(map.getZoom(),15),{duration:0.6});}
  if(lMarkers[id])lMarkers[id].bindPopup(popHtml(p),{maxWidth:260,minWidth:240,autoClose:false,closeOnClick:false}).openPopup();
  buildList();
  var li=document.getElementById('li'+id);if(li)li.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function deselect(){
  if(selId!==null&&lMarkers[selId])lMarkers[selId].closePopup();
  selId=null;refresh();buildList();
}
function buildFilters(){
  var el=document.getElementById('fbar');el.innerHTML='';
  var allOn=Object.keys(CATS).every(function(k){return active[k];});
  var ab=mkFb('Alle','#888',allOn);
  ab.onclick=function(){Object.keys(CATS).forEach(function(k){active[k]=!allOn;});buildFilters();refresh();buildList();};
  el.appendChild(ab);
  Object.keys(CATS).forEach(function(k){
    var c=CATS[k],b=mkFb(c.emoji+' '+c.label,c.color,active[k]);
    b.onclick=function(){active[k]=!active[k];buildFilters();refresh();buildList();};
    el.appendChild(b);
  });
}
function mkFb(label,color,on){var b=document.createElement('button');b.className='fb'+(on?' on':'');b.innerHTML='<span class="dot" style="background:'+color+'"></span>'+label;return b;}
function buildList(){
  var list=document.getElementById('sbl');
  var vis=P.filter(function(p){return active[p.cat];});
  if(nearbyMode&&uLat!==null)vis.sort(function(a,b){return gdist(uLat,uLng,a.lat,a.lng)-gdist(uLat,uLng,b.lat,b.lng);});
  document.getElementById('sbn').textContent=(nearbyMode&&uLat!==null)?'Nærmeste først':vis.length+' steder';
  list.innerHTML='';
  vis.forEach(function(p){
    var c=CATS[p.cat],r=ROUTES.find(function(x){return x.startId===p.id;});
    var distVal=uLat!==null?fmtD(gdist(uLat,uLng,p.lat,p.lng)):'';
    var d=document.createElement('div');d.className='pi'+(selId===p.id?' sel':'');d.id='li'+p.id;
    var bar=document.createElement('div');bar.className='pi-bar';bar.style.background=c.color;d.appendChild(bar);
    var body=document.createElement('div');body.className='pi-body';
    var nm=document.createElement('div');nm.className='pi-name';nm.textContent=p.name;body.appendChild(nm);
    var ct=document.createElement('div');ct.className='pi-cat';ct.style.color=c.color;ct.textContent=c.emoji+' '+c.label;body.appendChild(ct);
    if(r){var me=document.createElement('div');me.className='pi-cat';me.style.color='#1E3EFF';me.textContent=r.dist+' · '+r.terrain;body.appendChild(me);}
    var ad=document.createElement('div');ad.className='pi-addr';ad.textContent=p.addr;body.appendChild(ad);
    var no=document.createElement('div');no.className='pi-note';no.textContent=p.note;body.appendChild(no);
    var lw=document.createElement('div');lw.className='pi-links';
    function mkA(href,lbl){var a=document.createElement('a');a.href=href;a.textContent=lbl;a.target='_blank';a.rel='noopener';a.addEventListener('click',function(e){e.stopPropagation();});lw.appendChild(a);}
    if(p.url&&p.url!==p.ig)mkA(p.url,r?'Komoot ↗':'Nettside ↗');
    if(p.ig)mkA(p.ig,'Instagram ↗');
    mkA('https://maps.google.com/?q='+encodeURIComponent(p.name+' Berlin'),'Maps ↗');
    body.appendChild(lw);d.appendChild(body);
    if(distVal){var dv=document.createElement('div');dv.className='pi-dist'+(nearbyMode?' big':'');dv.textContent=distVal;d.appendChild(dv);}
    d.addEventListener('click',function(){select(p.id);});
    list.appendChild(d);
  });
}
function locateMe(){
  var btn=document.getElementById('locBtn');
  if(!navigator.geolocation){alert('Geolokasjon ikke tilgjengelig');return;}
  btn.textContent='Lokaliserer…';
  navigator.geolocation.getCurrentPosition(
    function(pos){
      uLat=pos.coords.latitude;uLng=pos.coords.longitude;
      if(uMarker)map.removeLayer(uMarker);
      uMarker=L.circleMarker([uLat,uLng],{radius:7,color:'#1E3EFF',fillColor:'#c8ff00',fillOpacity:1,weight:3,opacity:0.35}).addTo(map);
      map.flyTo([uLat,uLng],14,{duration:1});
      btn.textContent='◉ Fant deg';btn.classList.add('ok');buildList();
    },
    function(err){var m={1:'Tilgang nektet',2:'Utilgjengelig',3:'Tidsavbrudd'};alert(m[err.code]||'Feil');btn.textContent='◎ Finn meg';},
    {enableHighAccuracy:true,timeout:10000,maximumAge:0}
  );
}
function toggleNearby(){if(uLat===null){locateMe();return;}nearbyMode=!nearbyMode;document.getElementById('nearbyBtn').classList.toggle('ok',nearbyMode);buildList();}
function toggleSb(){sbOpen=!sbOpen;document.getElementById('sb').classList.toggle('open',sbOpen);document.getElementById('tog').textContent=sbOpen?'✕ Lukk':'☰ Liste';}
function gdist(la1,lo1,la2,lo2){var R=6371000,r=Math.PI/180,a=Math.sin((la2-la1)*r/2)*Math.sin((la2-la1)*r/2)+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin((lo2-lo1)*r/2)*Math.sin((lo2-lo1)*r/2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function fmtD(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';}
